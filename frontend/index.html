<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SwiftStack Solutions — Enterprise Software Development, Cloud Solutions & Digital Transformation" />
    <meta name="theme-color" content="#1a3c6e" />
    <title>SwiftStack Solutions | Enterprise Software Development</title>

    <!-- Google Fonts: Government / Professional Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons 1.11 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      /* ── CSS Custom Properties: Government Professional Theme ── */
      :root {
        /* Primary palette */
        --color-navy:       #1a3c6e;
        --color-navy-dark:  #112850;
        --color-navy-light: #234f8a;
        --color-gold:       #c8a84b;
        --color-gold-dark:  #a88a35;
        --color-gold-light: #dfc070;

        /* Neutrals */
        --color-white:      #ffffff;
        --color-off-white:  #f5f6f8;
        --color-light-gray: #e8ebef;
        --color-mid-gray:   #9ba8b5;
        --color-dark-gray:  #3d4f61;
        --color-charcoal:   #1e2d3d;

        /* Semantic */
        --color-success:    #2e7d32;
        --color-warning:    #f57c00;
        --color-error:      #c62828;
        --color-info:       #0277bd;

        /* Typography */
        --font-heading:     'Merriweather', Georgia, serif;
        --font-body:        'Source Sans 3', 'Segoe UI', sans-serif;
        --font-mono:        'Source Code Pro', 'Courier New', monospace;

        /* Spacing scale */
        --space-xs: 0.25rem;
        --space-sm: 0.5rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2rem;
        --space-2xl: 3rem;
        --space-3xl: 4rem;

        /* Shadows */
        --shadow-sm: 0 1px 3px rgba(26,60,110,0.12);
        --shadow-md: 0 4px 12px rgba(26,60,110,0.15);
        --shadow-lg: 0 8px 24px rgba(26,60,110,0.18);
        --shadow-xl: 0 16px 48px rgba(26,60,110,0.20);

        /* Border radius */
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 20px;

        /* Transitions */
        --transition-fast: 150ms ease;
        --transition-base: 250ms ease;
        --transition-slow: 400ms ease;
      }

      /* ── Reset & Base ── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }

      body {
        font-family: var(--font-body);
        color: var(--color-charcoal);
        background-color: var(--color-white);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── Government-style top banner ── */
      #gov-banner {
        background-color: var(--color-navy-dark);
        color: var(--color-mid-gray);
        font-size: 0.75rem;
        padding: 6px 0;
        border-bottom: 2px solid var(--color-gold);
      }

      #gov-banner .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 var(--space-lg);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* ── Loading screen ── */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: var(--color-navy);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #loading-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      .loading-logo {
        font-family: var(--font-heading);
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: 0.5px;
        margin-bottom: var(--space-lg);
      }

      .loading-logo span {
        color: var(--color-gold);
      }

      .loading-bar {
        width: 200px;
        height: 3px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-bar-fill {
        height: 100%;
        background: var(--color-gold);
        border-radius: 2px;
        animation: loading-fill 1.2s ease forwards;
      }

      @keyframes loading-fill {
        from { width: 0%; }
        to   { width: 100%; }
      }

      /* ── Root mount ── */
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-off-white); }
      ::-webkit-scrollbar-thumb { background: var(--color-navy-light); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-gold); }

      /* ── Selection ── */
      ::selection {
        background: var(--color-navy);
        color: var(--color-white);
      }
    </style>
  </head>

  <body>
    <!-- Government-style top announcement banner -->
    <div id="gov-banner">
      <div class="container">
        <span>
          <i class="bi bi-shield-check"></i>
          &nbsp;An Official SwiftStack Solutions Website
        </span>
        <span>
          <i class="bi bi-telephone"></i>&nbsp;+254 700 000 000
          &nbsp;&nbsp;|&nbsp;&nbsp;
          <i class="bi bi-envelope"></i>&nbsp;info@swiftstacksolutions.co.ke
        </span>
      </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo">Swift<span>Stack</span> Solutions</div>
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script>
      // Remove loading screen when React mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const screen = document.getElementById('loading-screen');
          if (screen) {
            screen.classList.add('fade-out');
            setTimeout(() => screen.remove(), 500);
          }
        }, 1300);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
